<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#F8FAFC"/>
  
  <!-- Main Arc -->
  <path d="M 12 32 Q 32 8 52 32" stroke="url(#arcGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Secondary arc (data flow) -->
  <path d="M 16 36 Q 32 20 48 36" stroke="url(#dataGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Data nodes -->
  <circle cx="16" cy="32" r="2.5" fill="#FF2D20"/>
  <circle cx="32" cy="14" r="2.5" fill="#3B82F6"/>
  <circle cx="48" cy="32" r="2.5" fill="#FF2D20"/>
  
  <!-- Center DTO -->
  <rect x="28" y="28" width="8" height="8" rx="2" fill="#1E40AF"/>
  <text x="32" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="white">D</text>
  
  <!-- Bottom indicator -->
  <rect x="24" y="48" width="16" height="2" rx="1" fill="url(#arcGrad)" opacity="0.8"/>
</svg>

